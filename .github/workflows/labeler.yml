name: PR Labeler

on:
  pull_request:
    types: [opened, edited, synchronize]

permissions:
      contents: read
      pull-requests: write
      issues: write

jobs:
  label:
     runs-on: ubuntu-latest
     steps:
       - uses: actions/labeler@634933edcd8ababfe52f92936142cc22ac488b1b # v6.0.1
         with:
           repo-token: "${{ secrets.GITHUB_TOKEN }}"
